const DB_NAME="AetherDB_V5";let db;
function initDB(){return new Promise(r=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=e=>{db=e.target.result;if(!db.objectStoreNames.contains('dataStore'))db.createObjectStore('dataStore')};req.onsuccess=e=>{db=e.target.result;r()};req.onerror=()=>r()})}
async function saveStateToDB(){return new Promise(r=>{try{const tx=db.transaction('dataStore','readwrite'),store=tx.objectStore('dataStore');let mediaToSave={};for(let k in globalMediaFiles)mediaToSave[k]={blob:globalMediaFiles[k].blob};store.put(globalMessages,'messages');store.put(mediaToSave,'media');store.put(Array.from(detectedSenders),'senders');store.put({userAlignmentMap,userAliasMap,customBgBlob,customMusicBlob},'config');tx.oncomplete=r;tx.onerror=r}catch(e){r()}})}
async function loadStateFromDB(){showProgressScreen("CONECTANDO...","Cargando memoria principal");updateProgress(20);return new Promise(r=>{try{const tx=db.transaction('dataStore','readonly'),store=tx.objectStore('dataStore');let m=null,md=null,s=null,c=null;store.get('messages').onsuccess=e=>m=e.target.result;store.get('media').onsuccess=e=>md=e.target.result;store.get('senders').onsuccess=e=>s=e.target.result;store.get('config').onsuccess=e=>c=e.target.result;tx.oncomplete=async()=>{updateProgress(60);if(m&&m.length>0){globalMessages=m;detectedSenders=new Set(s||[]);if(c){userAlignmentMap=c.userAlignmentMap||{};userAliasMap=c.userAliasMap||{};if(c.customBgBlob){customBgBlob=c.customBgBlob;applyBackground(customBgBlob)}if(c.customMusicBlob){customMusicBlob=c.customMusicBlob;applyMusic(customMusicBlob)}}globalMediaFiles={};if(md)for(let k in md)try{globalMediaFiles[k]={blob:md[k].blob,url:URL.createObjectURL(md[k].blob)}}catch(err){}updateProgress(100);buildIdentityMatrixUI();loaderUI.style.display='none';chatUI.style.display='block';toggleSettingsBtn.style.display='flex';addMoreBtn.style.display='flex';fullscreenBtn.style.display='flex';await renderChat()}else hideProgressScreen();r()};tx.onerror=()=>{hideProgressScreen();r()}}catch(e){hideProgressScreen();r()}})}
window.onload=async()=>{await initDB();await loadStateFromDB()};
function applyBackground(b){document.body.style.backgroundImage=`url('${URL.createObjectURL(b)}')`}
bgInput.addEventListener('change',e=>{if(e.target.files[0]){customBgBlob=e.target.files[0];applyBackground(customBgBlob)}});
clearBgBtn.addEventListener('click',()=>{customBgBlob=null;document.body.style.backgroundImage='none';bgInput.value=''});
function applyMusic(b){globalAudioPlayer.src=URL.createObjectURL(b);toggleMusicBtn.style.display='flex'}
musicInput.addEventListener('change',e=>{if(e.target.files[0]){customMusicBlob=e.target.files[0];applyMusic(customMusicBlob)}});
clearMusicBtn.addEventListener('click',()=>{customMusicBlob=null;globalAudioPlayer.src='';toggleMusicBtn.style.display='none';musicInput.value=''});
let isMusicPlaying=false;
toggleMusicBtn.addEventListener('click',()=>{if(isMusicPlaying){globalAudioPlayer.pause();toggleMusicBtn.style.background='#0f172a';toggleMusicBtn.style.color='#00ff88'}else{globalAudioPlayer.play().catch(()=>{});toggleMusicBtn.style.background='#00ff88';toggleMusicBtn.style.color='#000'}isMusicPlaying=!isMusicPlaying});
countBtn.addEventListener('click',()=>{const w=countInput.value.trim().toLowerCase();if(!w){countResult.style.display='none';return}let t=0,c={};const re=new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');globalMessages.forEach(m=>{const mt=m.content.match(re);if(mt){t+=mt.length;c[m.sender]=(c[m.sender]||0)+mt.length}});let h=`<div class="text-[var(--sys-blue)] mb-1">TOTAL VECES: ${t}</div>`;for(let s in c)h+=`<div>${userAliasMap[s]||s}: <span class="text-white">${c[s]}</span></div>`;countResult.innerHTML=h;countResult.style.display='block'});
purgeBtn.addEventListener('click',()=>{if(confirm("¿Borrar memoria?"))try{db.transaction('dataStore','readwrite').objectStore('dataStore').clear().onsuccess=()=>location.reload()}catch(e){location.reload()}});
toggleSettingsBtn.addEventListener('click',()=>settingsModal.style.display='flex');
closeModalBtn.addEventListener('click',()=>settingsModal.style.display='none');
addMoreBtn.addEventListener('click',()=>filesInput.click());
filesInput.addEventListener('change',async e=>{const f=Array.from(e.target.files);if(!f.length)return;showProgressScreen("EXTRAYENDO","Descomprimiendo...");try{let txts=[];for(let i=0;i<f.length;i++){let fl=f[i];if(fl.name.endsWith('.zip')){const zp=await JSZip.loadAsync(fl),fnm=Object.keys(zp.files);for(let j=0;j<fnm.length;j++){const n=fnm[j],d=zp.files[n];if(d.dir)continue;if(n.endsWith('.txt'))txts.push(await d.async("string"));else{const bl=await d.async("blob");globalMediaFiles[n]={url:URL.createObjectURL(bl),blob:bl}}if(j%10===0){updateProgress(Math.floor((j/fnm.length)*100));await new Promise(r=>setTimeout(r,0))}}}else if(fl.name.endsWith('.txt'))txts.push(await fl.text());else globalMediaFiles[fl.name]={url:URL.createObjectURL(fl),blob:fl}}await processRawTexts(txts)}catch(err){alert("ERROR: "+err.message);hideProgressScreen()}filesInput.value=""});
function parseWhatsAppDate(dStr,tStr){try{let d=dStr.replace(/[^\d\/\-\.]/g,''),t=tStr.replace(/[^\d:APM]/gi,'').toUpperCase(),p=d.split(/[\/\-\.]/),dy=parseInt(p[0]),mo=parseInt(p[1])-1,yr=parseInt(p[2]);if(dy<=12&&parseInt(p[1])>12){dy=parseInt(p[1]);mo=parseInt(p[0])-1}if(yr<100)yr+=2000;let h=parseInt(t.split(':')[0]),mi=parseInt(t.split(':')[1]);if(t.includes('P')&&h<12)h+=12;if(t.includes('A')&&h===12)h=0;return new Date(yr,mo,dy,h,mi)}catch(e){return new Date(0)}}
async function processRawTexts(ta){if(!ta.length){await saveStateToDB();hideProgressScreen();return}showProgressScreen("SINTETIZANDO","Analizando...");const rx=/^\[?(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})[, ]+(\d{1,2}:\d{2}(?::\d{2})?\s*[a-zA-Z\.]{0,4})\]?\s*[\-]?\s*([^:]+):\s*(.*)/;let us=new Set();globalMessages.forEach(m=>us.add(`${m.displayDate}_${m.sender}_${m.content}`));let tl=ta.reduce((a,l)=>a+l.split('\n').length,0),pl=0;for(let lg of ta){let cm=null,lns=lg.split('\n');for(let i=0;i<lns.length;i++){const mt=lns[i].match(rx);if(mt){detectedSenders.add(mt[3].trim());cm={dateObj:parseWhatsAppDate(mt[1],mt[2]),displayDate:`${mt[1]} ${mt[2]}`,sender:mt[3].trim(),content:mt[4].trim()};const s=`${cm.displayDate}_${cm.sender}_${cm.content}`;if(!us.has(s)){us.add(s);globalMessages.push(cm)}}else if(lns[i].trim()&&cm){us.delete(`${cm.displayDate}_${cm.sender}_${cm.content}`);cm.content+="\n"+lns[i].trim();us.add(`${cm.displayDate}_${cm.sender}_${cm.content}`)}pl++;if(pl%2000===0){updateProgress(Math.floor((pl/tl)*100));await new Promise(r=>setTimeout(r,0))}}}globalMessages.sort((a,b)=>a.dateObj-b.dateObj);buildIdentityMatrixUI();showProgressScreen("GUARDANDO","Persistencia...");updateProgress(50);await saveStateToDB();updateProgress(100);loaderUI.style.display='none';chatUI.style.display='block';toggleSettingsBtn.style.display='flex';addMoreBtn.style.display='flex';fullscreenBtn.style.display='flex';await renderChat()}
function buildIdentityMatrixUI(){identityMatrix.innerHTML='';Array.from(detectedSenders).forEach((s,i)=>{let da=userAlignmentMap[s]||((s.toLowerCase()==='yo'||i===0)?'right':'left');userAlignmentMap[s]=da;let ca=userAliasMap[s]||'',ss=s.replace(/"/g,'&quot;'),r=document.createElement('div');r.className='identity-row';r.innerHTML=`<div class="text-[10px] font-sys text-gray-300 truncate" title="${s}">${s}</div><div><input type="text" class="sys-input py-1 px-2 rounded text-[10px] alias-input" data-user="${ss}" placeholder="Alias..." value="${ca}"></div><div class="radio-group"><label><input type="radio" name="align_${i}" value="left" class="radio-input align-trigger" data-user="${ss}" ${da==='left'?'checked':''}><span class="radio-label left-side">IZQ</span></label><label><input type="radio" name="align_${i}" value="right" class="radio-input align-trigger" data-user="${ss}" ${da==='right'?'checked':''}><span class="radio-label right-side">DER</span></label></div>`;identityMatrix.appendChild(r)})}
applyMappingBtn.addEventListener('click',async()=>{document.querySelectorAll('.alias-input').forEach(inp=>{const u=inp.getAttribute('data-user'),v=inp.value.trim();if(v)userAliasMap[u]=v;else delete userAliasMap[u]});document.querySelectorAll('.align-trigger:checked').forEach(r=>{userAlignmentMap[r.getAttribute('data-user')]=r.value});settingsModal.style.display='none';showProgressScreen("APLICANDO","Guardando ajustes...");updateProgress(50);await saveStateToDB();await renderChat()});
const visibilityObserver=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting)entry.target.classList.add('in-view');else entry.target.classList.remove('in-view')})},{rootMargin:'200px'});
async function renderChat(){showProgressScreen("CONSTRUYENDO","Inyectando Efectos...");visibilityObserver.disconnect();messagesDiv.innerHTML='';let ld="";const fg=document.createDocumentFragment();jumpDateSelect.innerHTML='<option value="">[ SELECCIONAR ]</option>';const tm=globalMessages.length;for(let i=0;i<tm;i++){const m=globalMessages[i],iso=m.dateObj.toISOString().split('T')[0],dd=m.dateObj.toLocaleDateString();if(dd!==ld&&dd!=="Invalid Date"){const dv=document.createElement('div');dv.className="date-divider filter-item";dv.setAttribute('data-isodata',iso);dv.innerHTML=`<span>${dd}</span>`;fg.appendChild(dv);ld=dd;const o=document.createElement('option');o.value=iso;o.text=dd;jumpDateSelect.appendChild(o)}const ir=(userAlignmentMap[m.sender]||'left')==='right',dn=userAliasMap[m.sender]||m.sender;let fc=processMediaContent(m.content).replace(/\n/g,'<br>'),mt='text';if(fc.includes('class="sticker-file"'))mt='sticker';else if(fc.includes('<img'))mt='photo';else if(fc.includes('<video'))mt='video';else if(fc.includes('<audio'))mt='audio';let fx='';for(let v of vfxDictionary)if(v.regex.test(m.content)){fx=v.class;break}const div=document.createElement('div');div.className=`msg-container filter-item ${ir?'msg-right':'msg-left'}`;div.setAttribute('data-content',m.content.toLowerCase());div.setAttribute('data-isodata',iso);div.setAttribute('data-type',mt);div.innerHTML=`<div class="msg-wrapper ${fx}"><div class="name-label">${dn}</div><div class="leading-relaxed text-gray-200">${fc}</div><div class="timestamp">${m.dateObj.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;fg.appendChild(div);if(i%800===0||i===tm-1){updateProgress(Math.floor(((i+1)/tm)*100));await new Promise(r=>setTimeout(r,0))}}messagesDiv.appendChild(fg);document.querySelectorAll('.msg-wrapper').forEach(el=>visibilityObserver.observe(el));applyFilters();setTimeout(()=>{window.scrollTo(0,document.body.scrollHeight);hideProgressScreen()},50)}
function processMediaContent(t){let r=t;for(let fn in globalMediaFiles){const re=new RegExp(fn.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');if(re.test(t)){const u=globalMediaFiles[fn].url,ex=fn.split('.').pop().toLowerCase(),is=ex==='webp'||fn.toUpperCase().includes('STK');if(is)r=r.replace(re,`<br><img src="${u}" class="sticker-file" loading="lazy">`);else if(['jpg','jpeg','png','gif'].includes(ex))r=r.replace(re,`<br><img src="${u}" class="media-file" loading="lazy">`);else if(['mp4','webm'].includes(ex))r=r.replace(re,`<br><video controls src="${u}" class="media-file"></video>`);else if(['opus','ogg','mp3','m4a','wav'].includes(ex))r=r.replace(re,`<br><audio controls src="${u}" class="media-file mt-1"></audio>`);else r=r.replace(re,`<br><a href="${u}" download="${fn}" class="text-[var(--sys-blue)] text-xs font-bold underline mt-1 block">DESCARGAR</a>`)}}return r}
function applyFilters(){const tr=searchInput.value.toLowerCase().trim(),ft=filterSelect.value,sd=dateStart.value,ed=dateEnd.value;document.querySelectorAll('.filter-item').forEach(el=>{const iso=el.getAttribute('data-isodata');let v=true;if(sd&&iso<sd)v=false;if(ed&&iso>ed)v=false;if(el.classList.contains('date-divider'))el.style.display=v?'flex':'none';else{const c=el.getAttribute('data-content'),ty=el.getAttribute('data-type'),ms=c.includes(tr),mt=ft==='all'||ty===ft;el.style.display=(v&&ms&&mt)?'flex':'none'}})}
searchInput.addEventListener('input',applyFilters);filterSelect.addEventListener('change',applyFilters);dateStart.addEventListener('change',applyFilters);dateEnd.addEventListener('change',applyFilters);
jumpBtn.addEventListener('click',()=>{const td=jumpDateSelect.value;if(!td)return;const el=document.querySelector(`.date-divider[data-isodata="${td}"]`);if(el){settingsModal.style.display='none';window.scrollTo({top:el.getBoundingClientRect().top+window.pageYOffset-65,behavior:"smooth"});el.querySelector('span').style.borderColor="var(--sys-alert)";el.querySelector('span').style.color="var(--sys-alert)";setTimeout(()=>{el.querySelector('span').style.borderColor="rgba(0,0,0,0.8)";el.querySelector('span').style.color="#94a3b8"},2000)}});
</script></body></html>
