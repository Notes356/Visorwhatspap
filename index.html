<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AETHER // V19_NATURAL_SCROLL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-void: #05070a; --sys-blue: #00d2ff; --sys-alert: #ff2a5f;
            --solid-panel: #0a0d14; --sys-border: rgba(0, 210, 255, 0.2);
        }
        
        /* LA MAGIA DE TU SOLUCIÓN: Descongelamos el body y dejamos que fluya naturalmente */
        html, body {
            background-color: var(--bg-void); color: #e2e8f0; font-family: 'Inter', sans-serif;
            margin: 0; padding: 0; width: 100%; min-height: 100vh;
            /* El fondo se queda quieto mientras el contenido baja */
            background-attachment: fixed; background-size: cover; background-position: center;
            overflow-x: hidden;
            /* Si llegas al tope real, Android mostrará su recarga, como debe ser */
        }

        #bg-overlay { 
            position: fixed; inset: 0; background: rgba(5,7,10,0.85); z-index: -1; pointer-events: none; 
        }
        
        .font-sys { font-family: 'Rajdhani', sans-serif; text-transform: uppercase; letter-spacing: 0.05em; }

        .solid-panel { background: var(--solid-panel); border-bottom: 1px solid var(--sys-border); }

        .sys-btn {
            background: #0f172a; border: 1px solid var(--sys-blue); color: var(--sys-blue); 
            padding: 6px 14px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.75rem; 
            display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s;
        }
        
        .sys-input, .sys-select {
            background: #000; border: 1px solid #333; border-bottom: 2px solid var(--sys-blue);
            color: #fff; padding: 8px 12px; width: 100%; border-radius: 4px 4px 0 0; outline: none; 
            font-family: 'Inter', sans-serif; font-size: 0.8rem;
        }

        /* HEADER FLOTANTE: Siempre arriba mientras la página baja */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 50; height: 55px;
        }

        /* EL CHAT: Ya no tiene scroll interno, empuja la página. Le damos espacio para el header */
        .main-container {
            padding-top: 65px; 
            width: 100%;
        }

        #settingsModal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 60; 
            display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            width: 95%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column;
            border-top: 2px solid var(--sys-blue); border-radius: 8px; background: #0a0d14;
        }

        .identity-row { display: grid; grid-template-columns: 1.2fr 1.5fr auto; gap: 12px; align-items: center; padding: 8px 12px; border-bottom: 1px solid #1a1a1a; }
        @media (max-width: 768px) { .identity-row { grid-template-columns: 1fr; gap: 6px;} }
        .radio-group { display: flex; gap: 2px; background: #000; padding: 3px; border-radius: 4px; border: 1px solid #333;}
        .radio-label { cursor: pointer; padding: 4px 12px; font-size: 0.7rem; font-weight: 600; color: #666; border-radius: 2px; }
        .radio-input:checked + .radio-label.left-side { background: #331018; color: var(--sys-alert); }
        .radio-input:checked + .radio-label.right-side { background: #0a2030; color: var(--sys-blue); }
        .radio-input { display: none; }

        .msg-container { margin-bottom: 0.5rem; max-width: 85%; word-wrap: break-word; display: flex; flex-direction: column; }
        .msg-wrapper { padding: 8px 12px; background: #0d121c; border: 1px solid #1f2937; }
        .msg-left { align-items: flex-start; margin-right: auto; }
        .msg-left .msg-wrapper { border-left: 3px solid var(--sys-alert); border-radius: 0 8px 8px 8px; }
        .msg-right { align-items: flex-end; margin-left: auto; }
        .msg-right .msg-wrapper { border-right: 3px solid var(--sys-blue); border-radius: 8px 0 8px 8px; }
        
        .name-label { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
        .msg-left .name-label { color: var(--sys-alert); }
        .msg-right .name-label { color: var(--sys-blue); }
        .timestamp { font-size: 0.65rem; color: #64748b; margin-top: 2px; text-align: right; }

        .date-divider { text-align: center; margin: 1rem 0; display: flex; align-items: center; justify-content: center; scroll-margin-top: 70px; }
        .date-divider span { background: #000; border: 1px solid #333; padding: 2px 12px; border-radius: 12px; font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; color: #94a3b8; }

        .media-file { max-width: 100%; max-height: 250px; object-fit: contain; border-radius: 4px; margin-top: 4px; background: #000; }
        .sticker-file { max-width: 120px; max-height: 120px; object-fit: contain; margin-top: 2px; }
        
        .drop-zone { border: 1px dashed var(--sys-blue); background: #0a0d14; border-radius: 8px; margin: 20px; }
        
        #syncOverlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }

        .pixel-bar-container {
            width: 80%; max-width: 300px; padding: 4px; background: #000;
            border: 2px solid var(--sys-blue); box-shadow: 4px 4px 0 rgba(0, 210, 255, 0.2);
            position: relative; margin: 15px 0; display: none;
        }
        .pixel-bar-fill {
            height: 18px; background: var(--sys-blue); width: 0%;
            transition: width 0.1s linear;
        }
        .pixel-bar-text {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-family: 'Rajdhani', monospace; font-weight: bold; font-size: 0.9rem; color: #fff;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
    </style>
</head>
<body>

    <div id="bg-overlay"></div>
    
    <div id="syncOverlay">
        <div class="font-sys text-[var(--sys-blue)] text-2xl font-bold" id="overlayText">INICIALIZANDO</div>
        
        <div class="pixel-bar-container" id="pixelBarContainer">
            <div class="pixel-bar-fill" id="pixelBarFill"></div>
            <div class="pixel-bar-text" id="pixelBarText">0%</div>
        </div>

        <div class="text-gray-500 text-sm mt-2 font-mono" id="overlaySubtext">Por favor espere...</div>
    </div>

    <header class="px-4 solid-panel shrink-0 flex justify-between items-center w-full">
        <h1 class="text-lg font-bold text-white font-sys flex items-center gap-2">
            AETHER <span class="text-[var(--sys-blue)] font-normal text-sm opacity-70">| NEXUS V19</span>
        </h1>
        <div class="flex gap-2">
            <button id="addMoreBtn" class="sys-btn font-sys hidden" style="border-color: #a855f7; color: #a855f7;">+ ARCHIVOS</button>
            <button id="toggleSettingsBtn" class="sys-btn font-sys hidden">AJUSTES</button>
        </div>
    </header>

    <div id="settingsModal">
        <div class="modal-content">
            <div class="p-3 border-b border-[#333] flex justify-between items-center bg-[#05070a]">
                <h2 class="text-sm font-sys text-[var(--sys-blue)] font-bold">PANEL DE CONTROL</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-white text-xl font-mono px-2">X</button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 flex flex-col md:flex-row gap-4 bg-[#0a0d14]">
                <div class="w-full md:w-1/3 flex flex-col gap-4">
                    
                    <div class="bg-[#05070a] p-3 border border-[#333] border-l-2 border-l-[var(--sys-alert)]">
                        <h3 class="text-xs font-sys text-[var(--sys-alert)] mb-1 font-bold">SALTO TEMPORAL</h3>
                        <select id="jumpDateSelect" class="sys-select py-1.5 mb-2">
                            <option value="">[ SELECCIONA UNA FECHA ]</option>
                        </select>
                        <button id="jumpBtn" class="sys-btn w-full" style="border-color: var(--sys-alert); color: var(--sys-alert);">SALTAR A FECHA</button>
                    </div>

                    <div class="flex flex-col gap-2 bg-[#05070a] p-3 border border-[#333]">
                        <h3 class="text-xs font-sys text-[var(--sys-blue)] mb-1">FILTROS</h3>
                        <input type="text" id="searchInput" placeholder="Buscar texto..." class="sys-input py-1.5">
                    </div>

                    <button id="purgeBtn" class="sys-btn w-full mt-auto" style="border-color: red; color: red; background: rgba(255,0,0,0.1);">⚠️ BORRAR MEMORIA</button>
                </div>

                <div class="w-full md:w-2/3 flex flex-col">
                    <h3 class="text-xs font-sys text-white mb-2">MATRIZ DE IDENTIDAD (ALIAS)</h3>
                    <div id="identityMatrix" class="flex-1 bg-[#000] border border-[#333] overflow-y-auto max-h-[45vh]"></div>
                </div>
            </div>

            <div class="p-3 border-t border-[#333] flex justify-end bg-[#05070a]">
                <button id="applyMappingBtn" class="sys-btn font-sys">APLICAR Y RENDERIZAR</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <input type="file" id="filesInput" multiple accept=".zip,.txt,image/*,video/*,audio/*,.webp" class="hidden">
        
        <div id="loaderUI" class="flex items-center justify-center p-4 z-10 w-full h-[80vh]">
            <div class="drop-zone solid-panel p-6 text-center w-full max-w-lg cursor-pointer" onclick="document.getElementById('filesInput').click()">
                <h2 class="text-xl font-sys font-bold text-[var(--sys-blue)] mb-1">SISTEMA INACTIVO</h2>
                <p class="text-gray-400 text-xs mb-4">Toque aquí para cargar sus archivos.</p>
            </div>
        </div>
        
        <main id="chatUI" class="hidden">
            <div id="messagesDiv" class="max-w-4xl mx-auto flex flex-col pb-10 pt-2 w-full px-2"></div>
        </main>
    </div>

    <script>
        const filesInput = document.getElementById('filesInput');
        const loaderUI = document.getElementById('loaderUI');
        const chatUI = document.getElementById('chatUI');
        const messagesDiv = document.getElementById('messagesDiv');
        
        const syncOverlay = document.getElementById('syncOverlay');
        const overlayText = document.getElementById('overlayText');
        const overlaySubtext = document.getElementById('overlaySubtext');
        const pixelBarContainer = document.getElementById('pixelBarContainer');
        const pixelBarFill = document.getElementById('pixelBarFill');
        const pixelBarText = document.getElementById('pixelBarText');
        
        const toggleSettingsBtn = document.getElementById('toggleSettingsBtn');
        const addMoreBtn = document.getElementById('addMoreBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const purgeBtn = document.getElementById('purgeBtn');
        
        const searchInput = document.getElementById('searchInput');
        const identityMatrix = document.getElementById('identityMatrix');
        const applyMappingBtn = document.getElementById('applyMappingBtn');
        const jumpDateSelect = document.getElementById('jumpDateSelect');
        const jumpBtn = document.getElementById('jumpBtn');

        let globalMediaFiles = {}; 
        let globalMessages = []; 
        let detectedSenders = new Set();
        let userAlignmentMap = {}; 
        let userAliasMap = {};     

        function showProgressScreen(title, subtitle) {
            syncOverlay.style.display = 'flex';
            overlayText.innerText = title;
            overlaySubtext.innerText = subtitle;
            pixelBarContainer.style.display = 'block';
            updateProgress(0);
        }

        function updateProgress(pct) {
            pixelBarFill.style.width = pct + '%';
            pixelBarText.innerText = pct + '%';
        }

        function hideProgressScreen() {
            syncOverlay.style.display = 'none';
            pixelBarContainer.style.display = 'none';
        }

        const DB_NAME = "AetherDB_V2";
        let db;

        function initDB() {
            return new Promise((resolve) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains('dataStore')) {
                        db.createObjectStore('dataStore');
                    }
                };
                request.onsuccess = (e) => { db = e.target.result; resolve(); };
                request.onerror = (e) => resolve();
            });
        }

        async function saveStateToDB() {
            return new Promise((resolve) => {
                try {
                    const tx = db.transaction('dataStore', 'readwrite');
                    const store = tx.objectStore('dataStore');
                    
                    let mediaToSave = {};
                    for(let key in globalMediaFiles) {
                        mediaToSave[key] = { blob: globalMediaFiles[key].blob };
                    }

                    store.put(globalMessages, 'messages');
                    store.put(mediaToSave, 'media');
                    store.put(Array.from(detectedSenders), 'senders');
                    store.put({ userAlignmentMap, userAliasMap }, 'config');
                    
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => resolve();
                    tx.onabort = () => resolve();
                } catch(e) { resolve(); }
            });
        }

        async function loadStateFromDB() {
            showProgressScreen("CONECTANDO...", "Cargando base de datos guardada");
            updateProgress(20);
            
            return new Promise((resolve) => {
                try {
                    const tx = db.transaction('dataStore', 'readonly');
                    const store = tx.objectStore('dataStore');
                    let loadedMsgs = null, loadedMedia = null, loadedSenders = null, loadedConfig = null;

                    store.get('messages').onsuccess = (e) => loadedMsgs = e.target.result;
                    store.get('media').onsuccess = (e) => loadedMedia = e.target.result;
                    store.get('senders').onsuccess = (e) => loadedSenders = e.target.result;
                    store.get('config').onsuccess = (e) => loadedConfig = e.target.result;

                    tx.oncomplete = async () => {
                        updateProgress(60);
                        if (loadedMsgs && loadedMsgs.length > 0) {
                            globalMessages = loadedMsgs;
                            detectedSenders = new Set(loadedSenders || []);
                            if(loadedConfig) {
                                userAlignmentMap = loadedConfig.userAlignmentMap || {};
                                userAliasMap = loadedConfig.userAliasMap || {};
                            }
                            
                            globalMediaFiles = {};
                            if(loadedMedia) {
                                for(let key in loadedMedia) {
                                    try {
                                        globalMediaFiles[key] = { blob: loadedMedia[key].blob, url: URL.createObjectURL(loadedMedia[key].blob) };
                                    } catch(err) {}
                                }
                            }
                            
                            updateProgress(100);
                            buildIdentityMatrixUI();
                            loaderUI.style.display = 'none'; 
                            chatUI.style.display = 'block';
                            toggleSettingsBtn.style.display = 'flex'; 
                            addMoreBtn.style.display = 'flex';
                            
                            await renderChat();
                        } else {
                            hideProgressScreen();
                        }
                        resolve();
                    };
                    tx.onerror = () => { hideProgressScreen(); resolve(); };
                } catch(e) { hideProgressScreen(); resolve(); }
            });
        }

        window.onload = async () => {
            await initDB();
            await loadStateFromDB();
        };

        purgeBtn.addEventListener('click', () => {
            if(confirm("¿Estás seguro de borrar todo el historial guardado en esta aplicación?")) {
                try {
                    const tx = db.transaction('dataStore', 'readwrite');
                    tx.objectStore('dataStore').clear();
                    tx.oncomplete = () => location.reload();
                } catch(e) { location.reload(); }
            }
        });

        function toggleModal() { settingsModal.style.display = settingsModal.style.display === 'flex' ? 'none' : 'flex'; }
        toggleSettingsBtn.addEventListener('click', toggleModal);
        closeModalBtn.addEventListener('click', toggleModal);
        addMoreBtn.addEventListener('click', () => document.getElementById('filesInput').click());

        filesInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files); if (files.length === 0) return;
            
            showProgressScreen("EXTRAYENDO PAQUETE", "Descomprimiendo archivos...");
            
            try {
                let textLogs = [];
                for (let f = 0; f < files.length; f++) {
                    let file = files[f];
                    if (file.name.endsWith('.zip')) {
                        const zip = await JSZip.loadAsync(file); 
                        const fileNames = Object.keys(zip.files);
                        const totalFiles = fileNames.length;

                        for (let i = 0; i < totalFiles; i++) {
                            const filename = fileNames[i]; 
                            const fileData = zip.files[filename];
                            if (fileData.dir) continue;
                            
                            if (filename.endsWith('.txt')) {
                                textLogs.push(await fileData.async("string"));
                            } else {
                                const blob = await fileData.async("blob");
                                globalMediaFiles[filename] = { url: URL.createObjectURL(blob), blob: blob };
                            }

                            if (i % 5 === 0 || i === totalFiles - 1) {
                                updateProgress(Math.floor(((i + 1) / totalFiles) * 100));
                                await new Promise(r => setTimeout(r, 0)); 
                            }
                        }
                    } else if (file.name.endsWith('.txt')) {
                        textLogs.push(await file.text());
                        updateProgress(100);
                    } else {
                        globalMediaFiles[file.name] = { url: URL.createObjectURL(file), blob: file };
                        updateProgress(100);
                    }
                }
                
                await processRawTexts(textLogs);
            } catch (err) { alert("ERROR: " + err.message); hideProgressScreen(); }
            
            filesInput.value = ""; 
        });

        function parseWhatsAppDate(dateStr, timeStr) {
            try {
                let cDate = dateStr.replace(/[\u202F\u200E\s]/g, ''); let cTime = timeStr.replace(/[\u202F\u200E]/g, '').toUpperCase();
                let parts = cDate.split(/[\/\-\.]/); let p1 = parseInt(parts[0], 10), p2 = parseInt(parts[1], 10), p3 = parseInt(parts[2], 10);
                let day = p1, month = p2 - 1, year = p3; if (p1 <= 12 && p2 > 12) { day = p2; month = p1 - 1; } if (year < 100) year += 2000;
                let isPM = cTime.includes('P'); let isAM = cTime.includes('A'); let timeParts = cTime.replace(/[A-Z\.]/g, '').trim().split(':');
                let hours = parseInt(timeParts[0], 10), minutes = parseInt(timeParts[1], 10), secs = timeParts[2] ? parseInt(timeParts[2], 10) : 0;
                if (isPM && hours < 12) hours += 12; if (isAM && hours === 12) hours = 0;
                return new Date(year, month, day, hours, minutes, secs);
            } catch (e) { return new Date(0); }
        }

        async function processRawTexts(textLogsArray) {
            if (textLogsArray.length === 0) return;

            showProgressScreen("SINTETIZANDO TEXTOS", "Analizando cronología e identificando usuarios...");
            
            const msgRegex = /^\[?(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})[, ]+(\d{1,2}:\d{2}(?::\d{2})?\s*(?:[a-zA-Z\.]{1,4})?)\]?\s*[\-]?\s*([^:]+):\s*(.*)/;
            
            let uniqueSignatures = new Set();
            globalMessages.forEach(m => uniqueSignatures.add(`${m.displayDate}_${m.sender}_${m.content}`));

            let totalLines = textLogsArray.reduce((acc, log) => acc + log.split('\n').length, 0);
            let processedLines = 0;

            for (let log of textLogsArray) {
                let currentMsg = null;
                const lines = log.split('\n');
                
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const match = line.match(msgRegex);
                    
                    if (match) {
                        const dateStr = match[1]; const timeStr = match[2]; const sender = match[3].trim(); const content = match[4].trim();
                        detectedSenders.add(sender);
                        currentMsg = { dateObj: parseWhatsAppDate(dateStr, timeStr), displayDate: `${dateStr} ${timeStr}`, sender: sender, content: content };
                        const sig = `${dateStr}_${timeStr}_${sender}_${content}`;
                        if (!uniqueSignatures.has(sig)) { uniqueSignatures.add(sig); globalMessages.push(currentMsg); }
                    } else if (line.trim().length > 0 && currentMsg) {
                        const oldSig = `${currentMsg.displayDate}_${currentMsg.sender}_${currentMsg.content}`;
                        uniqueSignatures.delete(oldSig); currentMsg.content += "\n" + line.trim();
                        uniqueSignatures.add(`${currentMsg.displayDate}_${currentMsg.sender}_${currentMsg.content}`);
                    }

                    processedLines++;
                    if (processedLines % 1000 === 0 || processedLines === totalLines) {
                        updateProgress(Math.floor((processedLines / totalLines) * 100));
                        await new Promise(r => setTimeout(r, 0));
                    }
                }
            }

            globalMessages.sort((a, b) => a.dateObj - b.dateObj);
            buildIdentityMatrixUI();
            
            showProgressScreen("GUARDANDO", "Asegurando datos en la memoria...");
            updateProgress(50);
            await saveStateToDB();
            updateProgress(100);
            
            loaderUI.style.display = 'none'; chatUI.style.display = 'block';
            toggleSettingsBtn.style.display = 'flex'; addMoreBtn.style.display = 'flex';
            
            await renderChat(); 
        }

        function buildIdentityMatrixUI() {
            identityMatrix.innerHTML = ''; 
            Array.from(detectedSenders).forEach((sender, index) => {
                let defaultAlign = userAlignmentMap[sender] || ((sender.toLowerCase() === 'yo' || index === 0) ? 'right' : 'left');
                userAlignmentMap[sender] = defaultAlign; let currentAlias = userAliasMap[sender] || '';
                const safeSender = sender.replace(/"/g, '&quot;');

                const row = document.createElement('div'); row.className = 'identity-row';
                row.innerHTML = `
                    <div class="text-[11px] font-sys text-gray-300 truncate" title="${sender}">${sender}</div>
                    <div><input type="text" class="sys-input py-1 px-2 rounded text-[11px] alias-input" data-user="${safeSender}" placeholder="Alias..." value="${currentAlias}"></div>
                    <div class="radio-group">
                        <label><input type="radio" name="align_${index}" value="left" class="radio-input align-trigger" data-user="${safeSender}" ${defaultAlign === 'left' ? 'checked' : ''}><span class="radio-label left-side">IZQ</span></label>
                        <label><input type="radio" name="align_${index}" value="right" class="radio-input align-trigger" data-user="${safeSender}" ${defaultAlign === 'right' ? 'checked' : ''}><span class="radio-label right-side">DER</span></label>
                    </div>
                `;
                identityMatrix.appendChild(row);
            });
        }

        applyMappingBtn.addEventListener('click', async () => {
            document.querySelectorAll('.alias-input').forEach(input => {
                const user = input.getAttribute('data-user'); const val = input.value.trim();
                if (val) userAliasMap[user] = val; else delete userAliasMap[user];
            });
            document.querySelectorAll('.align-trigger:checked').forEach(radio => {
                userAlignmentMap[radio.getAttribute('data-user')] = radio.value;
            });

            settingsModal.style.display = 'none'; 
            
            showProgressScreen("APLICANDO CAMBIOS", "Guardando nueva configuración...");
            updateProgress(50);
            await saveStateToDB(); 
            
            await renderChat(); 
        });

        async function renderChat() {
            showProgressScreen("CONSTRUYENDO INTERFAZ", "Renderizando burbujas de chat...");
            
            messagesDiv.innerHTML = ''; 
            let lastDateRendered = ""; 
            const fragment = document.createDocumentFragment();
            jumpDateSelect.innerHTML = '<option value="">[ SELECCIONA UNA FECHA ]</option>';

            const totalMsgs = globalMessages.length;

            for (let i = 0; i < totalMsgs; i++) {
                const msg = globalMessages[i];
                const dateOnly = msg.dateObj.toISOString().split('T')[0]; 
                const displayDateOnly = msg.dateObj.toLocaleDateString();
                
                if (displayDateOnly !== lastDateRendered && displayDateOnly !== "Invalid Date") {
                    const dateDiv = document.createElement('div'); dateDiv.className = "date-divider filter-item"; dateDiv.setAttribute('data-isodata', dateOnly);
                    dateDiv.innerHTML = `<span>${displayDateOnly}</span>`; fragment.appendChild(dateDiv); lastDateRendered = displayDateOnly;
                    
                    const option = document.createElement('option');
                    option.value = dateOnly; option.text = displayDateOnly;
                    jumpDateSelect.appendChild(option);
                }

                const isRight = (userAlignmentMap[msg.sender] || 'left') === 'right';
                const displayName = userAliasMap[msg.sender] || msg.sender; 
                let finalContent = processMediaContent(msg.content).replace(/\n/g, '<br>');

                const div = document.createElement('div');
                div.className = `msg-container filter-item ${isRight ? 'msg-right' : 'msg-left'}`;
                div.setAttribute('data-content', msg.content.toLowerCase()); div.setAttribute('data-isodata', dateOnly);

                div.innerHTML = `
                    <div class="msg-wrapper">
                        <div class="name-label">${displayName}</div>
                        <div class="text-[0.85rem] md:text-sm leading-relaxed text-gray-200">${finalContent}</div>
                        <div class="timestamp">${msg.dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                `;
                fragment.appendChild(div);

                if (i % 500 === 0 || i === totalMsgs - 1) {
                    updateProgress(Math.floor(((i + 1) / totalMsgs) * 100));
                    await new Promise(r => setTimeout(r, 0));
                }
            }
            
            messagesDiv.appendChild(fragment); 
            applyFilters();
            
            // EL CAMBIO DE SCROLL: Ahora usamos window.scrollTo para mover la página entera
            setTimeout(() => {
                window.scrollTo(0, document.body.scrollHeight);
                hideProgressScreen();
            }, 100);
        }

        jumpBtn.addEventListener('click', () => {
            const targetDate = jumpDateSelect.value;
            if (!targetDate) return;
            const targetElement = document.querySelector(`.date-divider[data-isodata="${targetDate}"]`);
            if (targetElement) {
                toggleModal(); 
                // Aseguramos que el salto tenga en cuenta el espacio del header flotante
                const headerOffset = 65;
                const elementPosition = targetElement.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                
                window.scrollTo({
                    top: offsetPosition,
                    behavior: "smooth"
                });

                targetElement.querySelector('span').style.borderColor = "var(--sys-alert)";
                targetElement.querySelector('span').style.color = "var(--sys-alert)";
                setTimeout(() => {
                    targetElement.querySelector('span').style.borderColor = "#333";
                    targetElement.querySelector('span').style.color = "#94a3b8";
                }, 2000);
            }
        });

        function processMediaContent(text) {
            let processedText = text;
            for (let filename in globalMediaFiles) {
                const safeFilename = filename.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); const regex = new RegExp(safeFilename, 'g');
                if (regex.test(text)) {
                    const fileUrl = globalMediaFiles[filename].url; const ext = filename.split('.').pop().toLowerCase();
                    const isSticker = ext === 'webp' || filename.toUpperCase().includes('STK');
                    
                    let mediaHtml = '';
                    if (isSticker) mediaHtml = `<br><img src="${fileUrl}" class="sticker-file" loading="lazy">`;
                    else if (['jpg', 'jpeg', 'png', 'gif'].includes(ext)) mediaHtml = `<br><img src="${fileUrl}" class="media-file" loading="lazy">`;
                    else if (['mp4', 'webm'].includes(ext)) mediaHtml = `<br><video controls src="${fileUrl}" class="media-file"></video>`;
                    else if (['opus', 'ogg', 'mp3', 'm4a', 'wav'].includes(ext)) mediaHtml = `<br><audio controls src="${fileUrl}" class="media-file mt-1"></audio>`;
                    else mediaHtml = `<br><a href="${fileUrl}" download="${filename}" class="text-[var(--sys-blue)] text-xs font-bold underline mt-1 block">DESCARGAR</a>`;
                    processedText = processedText.replace(regex, mediaHtml);
                }
            }
            return processedText;
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            document.querySelectorAll('.filter-item').forEach(el => {
                if (!el.classList.contains('date-divider')) {
                    const content = el.getAttribute('data-content');
                    el.style.display = content.includes(searchTerm) ? 'flex' : 'none';
                }
            });
        }
        searchInput.addEventListener('input', applyFilters);

    </script>
</body>
</html>
