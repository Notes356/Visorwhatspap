<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AETHER // V24_MODULAR_FIX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="bg-overlay"></div>
    <audio id="globalAudioPlayer" loop></audio>
    
    <div id="syncOverlay">
        <div class="font-sys text-[var(--sys-blue)] text-2xl font-bold" id="overlayText">INICIALIZANDO</div>
        <div class="pixel-bar-container" id="pixelBarContainer">
            <div class="pixel-bar-fill" id="pixelBarFill"></div>
            <div class="pixel-bar-text" id="pixelBarText">0%</div>
        </div>
        <div class="text-gray-500 text-sm mt-2 font-mono" id="overlaySubtext">Por favor espere...</div>
    </div>

    <header class="px-2 md:px-4 solid-panel shrink-0 flex justify-between items-center w-full">
        <h1 class="text-lg font-bold text-white font-sys flex items-center gap-2">
            AETHER <span class="text-[var(--sys-blue)] font-normal text-sm opacity-70 hidden md:inline">| MODULAR V24</span>
        </h1>
        <div class="flex gap-1 md:gap-2">
            <button id="zoomOutBtn" class="sys-btn" title="Achicar Letra">A-</button>
            <button id="zoomInBtn" class="sys-btn" title="Agrandar Letra">A+</button>
            <button id="playBtn" class="sys-btn play-btn" title="Simulador de Lectura">▶️</button>
            
            <button id="fullscreenBtn" class="sys-btn fs-btn" title="Pantalla Completa">[ ]</button>
            
            <button id="toggleMusicBtn" class="sys-btn hidden" style="border-color: #00ff88; color: #00ff88;">🎵</button>
            <button id="addMoreBtn" class="sys-btn font-sys hidden">+ DATOS</button>
            <button id="toggleSettingsBtn" class="sys-btn">⚙️ AJUSTES</button>
        </div>
    </header>

    <div id="settingsModal">
        <div class="modal-content">
            <div class="p-3 border-b border-[#333] flex justify-between items-center bg-[#05070a]">
                <h2 class="text-sm font-sys text-[var(--sys-blue)] font-bold">PANEL OMNI_CORE</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-white text-xl font-mono px-2">X</button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 bg-[#0a0d14]">
                
                <div class="flex flex-col gap-3">
                    <div class="bg-[#05070a] p-3 border border-[#333] border-l-2 border-l-[var(--sys-alert)]">
                        <h3 class="text-[10px] font-sys text-[var(--sys-alert)] mb-1">SALTO TEMPORAL</h3>
                        <select id="jumpDateSelect" class="sys-select mb-2"><option value="">[ SELECCIONAR FECHA ]</option></select>
                        <button id="jumpBtn" class="sys-btn w-full" style="border-color: var(--sys-alert); color: var(--sys-alert);">EJECUTAR SALTO</button>
                    </div>
                    <div class="flex flex-col gap-2 bg-[#05070a] p-3 border border-[#333]">
                        <h3 class="text-[10px] font-sys text-[var(--sys-blue)] mb-1">FILTROS GLOBALES</h3>
                        <input type="text" id="searchInput" placeholder="Buscar texto..." class="sys-input">
                        <select id="filterSelect" class="sys-select">
                            <option value="all">TODOS</option>
                            <option value="photo">FOTOS</option>
                            <option value="sticker">STICKERS</option>
                            <option value="video">VIDEOS</option>
                            <option value="audio">AUDIOS</option>
                        </select>
                        <div class="grid grid-cols-2 gap-2 mt-1">
                            <div><label class="text-[9px] text-gray-500">DESDE</label><input type="date" id="dateStart" class="sys-input px-1"></div>
                            <div><label class="text-[9px] text-gray-500">HASTA</label><input type="date" id="dateEnd" class="sys-input px-1"></div>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-3">
                    <div class="bg-[#05070a] p-3 border border-[#333] border-l-2 border-l-[#00ff88]">
                        <h3 class="text-[10px] font-sys text-[#00ff88] mb-1">CONTADOR</h3>
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="countInput" placeholder="Palabra..." class="sys-input flex-1">
                            <button id="countBtn" class="sys-btn" style="border-color: #00ff88; color: #00ff88;">CONTAR</button>
                        </div>
                        <div id="countResult" class="text-[10px] text-gray-300 font-mono mt-2 bg-black p-2 rounded hidden"></div>
                    </div>
                    <div class="bg-[#05070a] p-3 border border-[#333]">
                        <h3 class="text-[10px] font-sys text-white mb-1">FONDO (JPG/GIF)</h3>
                        <input type="file" id="bgInput" accept="image/*" class="sys-input text-[9px] mb-1 p-1">
                        <button id="clearBgBtn" class="text-[9px] text-gray-500 hover:text-white">X QUITAR FONDO</button>
                    </div>
                    <div class="bg-[#05070a] p-3 border border-[#333]">
                        <h3 class="text-[10px] font-sys text-[#a855f7] mb-1">MÚSICA (MP3)</h3>
                        <input type="file" id="musicInput" accept="audio/*" class="sys-input text-[9px] mb-1 p-1">
                        <button id="clearMusicBtn" class="text-[9px] text-gray-500 hover:text-white">X QUITAR MÚSICA</button>
                    </div>
                    <button id="purgeBtn" class="sys-btn w-full mt-auto" style="border-color: red; color: red;">⚠️ BORRAR MEMORIA</button>
                </div>

                <div class="flex flex-col">
                    <h3 class="text-xs font-sys text-white mb-2">IDENTIDADES (ALIAS Y POSICIÓN)</h3>
                    <div id="identityMatrix" class="flex-1 bg-[#000] border border-[#333] overflow-y-auto max-h-[45vh] md:max-h-full"></div>
                </div>
            </div>

            <div class="p-3 border-t border-[#333] flex justify-end bg-[#05070a]">
                <button id="applyMappingBtn" class="sys-btn font-sys">GUARDAR Y RENDERIZAR</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <input type="file" id="filesInput" multiple accept=".zip,.txt,image/*,video/*,audio/*,.webp" class="hidden">
        
        <div id="loaderUI" class="flex items-center justify-center p-4 z-10 w-full h-[80vh]">
            <div class="drop-zone solid-panel p-6 text-center w-full max-w-lg cursor-pointer" onclick="document.getElementById('filesInput').click()">
                <h2 class="text-xl font-sys font-bold text-[var(--sys-blue)] mb-1">SISTEMA INACTIVO</h2>
                <p class="text-gray-400 text-xs mb-4">Toque aquí para cargar sus archivos .ZIP o .TXT</p>
            </div>
        </div>
        
        <main id="chatUI" class="hidden">
            <div id="messagesDiv" class="max-w-4xl mx-auto flex flex-col pb-10 pt-2 w-full px-2"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
